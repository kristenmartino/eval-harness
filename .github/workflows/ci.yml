name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests (stdlib only — no deps to install)
        run: python -m unittest discover -s tests -v
      - name: Smoke-test the end-to-end examples
        run: |
          python scripts/example_run.py
          python scripts/example_task_b.py
          python scripts/example_holdout.py
          python scripts/example_agent_run.py
          python scripts/example_tierb.py
      - name: Verify the committed held-out lock still matches its fixture
        run: |
          python scripts/lock_holdout.py --dataset data/sample_holdout.jsonl --out /tmp/relock.sha256
          python - <<'PY'
          import json
          a = json.load(open("data/holdout.sha256"))["aggregate_sha256"]
          b = json.load(open("/tmp/relock.sha256"))["aggregate_sha256"]
          assert a == b, f"holdout.sha256 is stale: committed {a} != recomputed {b}"
          print("held-out lock matches fixture:", a)
          PY
      - name: Tier-A trajectory regression gate (replay golden cassettes, key-free)
        run: python scripts/ci_trajectory_gate.py
      - name: Verify the tool-registry schema lock (baseline still valid)
        run: python scripts/lock_registry.py

  web-build:
    name: web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
